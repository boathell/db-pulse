name: Publish GitHub release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: db-pulse-release
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out verified commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Check release readiness
        id: readiness
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if grep -q "^## \[$version\]" CHANGELOG.md; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Release section for $version is present; release publication is enabled."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No released Changelog section for $version; leaving the development release unpublished."
          fi

      - name: Verify repository and website release contract
        if: steps.readiness.outputs.ready == 'true'
        run: npm run release:check

      - name: Create missing GitHub release
        if: steps.readiness.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFIED_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v$version"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "$tag already exists; nothing to publish."
            exit 0
          fi
          npm run --silent release:notes -- "$version" > "$RUNNER_TEMP/release-notes.md"
          test -s "$RUNNER_TEMP/release-notes.md"
          gh release create "$tag" --target "$VERIFIED_SHA" --title "DB Pulse $tag" --notes-file "$RUNNER_TEMP/release-notes.md"
