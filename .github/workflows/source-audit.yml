name: Audit source health

on:
  schedule:
    - cron: "37 3,11,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agent-pulse-source-audit-main
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: sqlite:./var/source-audit.db
      COLLECTOR_CONCURRENCY: 4
    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Audit every configured source
        run: npm run sources:audit -- --concurrency=4 --report=data/reports/source-health.json

      - name: Validate report privacy and shape
        shell: bash
        run: |
          set -euo pipefail
          test -s data/reports/source-health.json
          git diff --check -- data/reports/source-health.json
          if grep -E 'gh[opsu]_[A-Za-z0-9_]{20,}|-----BEGIN .*PRIVATE KEY-----|/Users/[^/]+/|/home/runner/|"(token|secret|password|cookie|authorization|api[_-]?key)"[[:space:]]*:' data/reports/source-health.json; then
            echo "Private material detected in source health report" >&2
            exit 1
          fi

      - name: Commit report when changed
        shell: bash
        run: |
          set -euo pipefail
          git add -- data/reports/source-health.json
          if git diff --cached --quiet; then
            echo "No report changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): refresh source health report"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
